<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Project Pro – Manager Dashboard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f0f2f5;min-height:100vh}

  /* PIN screen */
  #pinScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  #pinScreen .lock{font-size:3.5rem;margin-bottom:16px}
  #pinScreen h2{color:#16213e;font-size:1.4rem;margin-bottom:6px}
  #pinScreen p{color:#888;font-size:.9rem;margin-bottom:24px}
  #pinInput{border:2px solid #e5e7eb;border-radius:10px;padding:14px 20px;font-size:1.6rem;text-align:center;letter-spacing:8px;width:200px;outline:none;transition:border-color .2s}
  #pinInput:focus{border-color:#e85d04}
  #pinBtn{margin-top:14px;background:#e85d04;color:#fff;border:none;padding:13px 40px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;width:200px}
  #pinBtn:hover{background:#c44c00}
  #pinError{color:#ef4444;font-size:.85rem;margin-top:10px;min-height:20px}

  /* Header */
  header{background:#16213e;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  header .logo-titles{display:flex;align-items:center;gap:14px}
  header .titles{color:#fff}
  header .titles h1{font-size:1.1rem;font-weight:700}
  header .titles p{font-size:.75rem;color:#aab}
  #logoutBtn{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);padding:7px 16px;border-radius:7px;cursor:pointer;font-size:.85rem;font-weight:600}
  #logoutBtn:hover{background:rgba(255,255,255,.2)}

  /* Dashboard */
  #dashboard{display:none}
  .dash-body{max-width:900px;margin:0 auto;padding:20px 16px 60px}

  /* Stats */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
  .stat-card{background:#fff;border-radius:12px;padding:16px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.07)}
  .stat-card .num{font-size:2rem;font-weight:900;line-height:1}
  .stat-card .lbl{font-size:.75rem;color:#888;margin-top:4px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
  .stat-card.new .num{color:#ef4444}
  .stat-card.inprog .num{color:#f97316}
  .stat-card.resolved .num{color:#22c55e}

  /* Filter tabs */
  .filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:18px;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .filter-btn{border:2px solid #e5e7eb;background:#fff;border-radius:20px;padding:7px 16px;font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;color:#555}
  .filter-btn:hover{border-color:#e85d04;color:#e85d04}
  .filter-btn.active{background:#e85d04;border-color:#e85d04;color:#fff}

  /* Ticket cards */
  .ticket-card{background:#fff;border-radius:12px;margin-bottom:12px;padding:16px;box-shadow:0 2px 6px rgba(0,0,0,.07);border-left:5px solid #ccc;cursor:pointer;transition:transform .15s,box-shadow .15s}
  .ticket-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.12)}
  .ticket-card.urgent{border-left-color:#ef4444}
  .ticket-card.regular{border-left-color:#22c55e}
  .tc-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
  .tc-id{font-size:.8rem;font-weight:800;color:#16213e;background:#f0f2f5;padding:3px 8px;border-radius:5px}
  .badge{font-size:.72rem;font-weight:700;padding:3px 9px;border-radius:20px}
  .badge.urgent{background:#fef2f2;color:#ef4444}
  .badge.regular{background:#f0fdf4;color:#22c55e}
  .badge.new{background:#eff6ff;color:#3b82f6}
  .badge.in-progress{background:#fff7ed;color:#f97316}
  .badge.resolved{background:#f0fdf4;color:#22c55e}
  .tc-meta{font-size:.82rem;color:#555;margin-bottom:6px}
  .tc-meta strong{color:#222}
  .tc-desc{font-size:.83rem;color:#777;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .tc-time{font-size:.75rem;color:#bbb;margin-top:6px}

  /* Empty state */
  .empty{text-align:center;padding:60px 20px;color:#aaa}
  .empty div{font-size:2.5rem;margin-bottom:12px}

  /* Toast */
  #toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#16213e;color:#fff;padding:10px 22px;border-radius:8px;font-size:.9rem;font-weight:600;z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap}
  #toast.show{opacity:1}

  /* Modal */
  #modalOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
  #modalOverlay.open{display:flex}
  #modal{background:#fff;border-radius:16px;width:100%;max-width:600px;margin:auto;overflow:hidden}
  .modal-header{background:#16213e;color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
  .modal-header h2{font-size:1rem;font-weight:700}
  #closeModal{background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer;line-height:1;padding:0 4px}
  .modal-body{padding:20px}
  .detail-row{display:flex;gap:8px;margin-bottom:10px;font-size:.88rem;flex-wrap:wrap}
  .detail-row .lbl{font-weight:700;color:#555;min-width:110px}
  .detail-row .val{color:#222}
  .detail-row .val a{color:#e85d04;text-decoration:none}
  .modal-media{margin:14px 0}
  .modal-media img{max-width:100%;border-radius:8px;cursor:pointer}
  .modal-media video{max-width:100%;border-radius:8px}
  .modal-media a{display:inline-block;margin-top:8px;font-size:.82rem;color:#e85d04;font-weight:600}
  .status-row{display:flex;gap:8px;margin:14px 0;flex-wrap:wrap}
  .status-btn{border:2px solid #e5e7eb;background:#f9fafb;border-radius:8px;padding:9px 18px;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s}
  .status-btn:hover{border-color:#888}
  .status-btn.active-new{border-color:#3b82f6;background:#eff6ff;color:#3b82f6}
  .status-btn.active-inprog{border-color:#f97316;background:#fff7ed;color:#f97316}
  .status-btn.active-resolved{border-color:#22c55e;background:#f0fdf4;color:#22c55e}
  .notes-area{width:100%;border:2px solid #e5e7eb;border-radius:8px;padding:10px 12px;font-size:.88rem;font-family:inherit;min-height:90px;resize:vertical;outline:none}
  .notes-area:focus{border-color:#e85d04}
  #saveNotes{background:#16213e;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;margin-top:8px}
  #saveNotes:hover{background:#0f3460}
  .section-label{font-size:.72rem;font-weight:800;letter-spacing:1.2px;color:#888;text-transform:uppercase;margin:16px 0 8px}
</style>
</head>
<body>

<div id="toast"></div>

<!-- PIN Screen -->
<div id="pinScreen">
  <div class="lock">🔒</div>
  <h2>Manager Access</h2>
  <p>Enter your PIN to continue</p>
  <input type="password" id="pinInput" maxlength="4" placeholder="••••" inputmode="numeric" onkeydown="if(event.key==='Enter')checkPin()"/>
  <button id="pinBtn" onclick="checkPin()">Unlock</button>
  <div id="pinError"></div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <header>
    <div class="logo-titles">
      <svg viewBox="0 0 430 95" height="28px" xmlns="http://www.w3.org/2000/svg">
        <polygon points="10,40 34,26 58,40 34,54" fill="#5B8DD9"/>
        <polygon points="10,40 34,54 34,82 10,68" fill="#2E6DB4"/>
        <polygon points="34,54 58,40 58,68 34,82" fill="#1A5499"/>
        <polygon points="28,16 52,2 76,16 52,30" fill="#66BB6A"/>
        <polygon points="28,16 52,30 52,58 28,44" fill="#388E3C"/>
        <polygon points="52,30 76,16 76,44 52,58" fill="#2E7D32"/>
        <text x="88" y="64" font-size="50" font-weight="bold" fill="#2E6DB4" font-family="Trebuchet MS">Project Pro</text>
        <text x="88" y="88" font-size="18" fill="#388E3C" font-style="italic" font-family="Georgia">Since 2013</text>
        <text x="340" y="88" font-size="18" fill="#388E3C" font-style="italic" font-family="Georgia">group</text>
      </svg>
      <div class="titles">
        <h1>Manager Dashboard</h1>
        <p>Logistics control panel</p>
      </div>
    </div>
    <button id="logoutBtn" onclick="logout()">🔒 Logout</button>
  </header>

  <div class="dash-body">
    <!-- Stats -->
    <div class="stats">
      <div class="stat-card new"><div class="num" id="countNew">0</div><div class="lbl">New</div></div>
      <div class="stat-card inprog"><div class="num" id="countInProg">0</div><div class="lbl">In Progress</div></div>
      <div class="stat-card resolved"><div class="num" id="countResolved">0</div><div class="lbl">Resolved</div></div>
    </div>

    <!-- Filter tabs -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter(this)">All</button>
      <button class="filter-btn" data-filter="new" onclick="setFilter(this)">🔴 New</button>
      <button class="filter-btn" data-filter="in-progress" onclick="setFilter(this)">🟡 In Progress</button>
      <button class="filter-btn" data-filter="resolved" onclick="setFilter(this)">✅ Resolved</button>
      <button class="filter-btn" data-filter="urgent" onclick="setFilter(this)">⚡ Urgent</button>
    </div>

    <!-- Ticket list -->
    <div id="ticketList"></div>
  </div>
</div>

<!-- Detail Modal -->
<div id="modalOverlay" onclick="handleOverlayClick(event)">
  <div id="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Ticket Details</h2>
      <button id="closeModal" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const CORRECT_PIN = '1234';
let allTickets = [];
let currentFilter = 'all';
let currentTicketId = null;
let prevCount = -1;
let audioCtx = null;

// ── PIN ──────────────────────────────────────────────
function checkPin() {
  const val = document.getElementById('pinInput').value;
  if (val === CORRECT_PIN) {
    document.getElementById('pinScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    startPolling();
  } else {
    document.getElementById('pinError').textContent = 'Incorrect PIN. Try again.';
    document.getElementById('pinInput').value = '';
  }
}

function logout() {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('pinScreen').style.display = 'flex';
  document.getElementById('pinInput').value = '';
  document.getElementById('pinError').textContent = '';
  clearInterval(pollInterval);
}

// ── Toast ─────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ── Audio beep ────────────────────────────────────────
function playBeep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sine'; osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
  } catch {}
}

// ── Time ago ──────────────────────────────────────────
function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

// ── Fetch & render ────────────────────────────────────
async function fetchTickets() {
  try {
    const res = await fetch('/api/tickets');
    allTickets = await res.json();

    // Stats
    document.getElementById('countNew').textContent = allTickets.filter(t=>t.status==='new').length;
    document.getElementById('countInProg').textContent = allTickets.filter(t=>t.status==='in-progress').length;
    document.getElementById('countResolved').textContent = allTickets.filter(t=>t.status==='resolved').length;

    // New ticket notification
    if (prevCount >= 0 && allTickets.length > prevCount) {
      playBeep();
      showToast('🔔 New request received!');
    }
    prevCount = allTickets.length;

    renderTickets();
  } catch {}
}

function renderTickets() {
  let list = allTickets;
  if (currentFilter === 'urgent') list = list.filter(t => t.priority === 'urgent');
  else if (currentFilter !== 'all') list = list.filter(t => t.status === currentFilter);

  const el = document.getElementById('ticketList');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div>📭</div>No tickets here yet.</div>';
    return;
  }

  el.innerHTML = list.map(t => `
    <div class="ticket-card ${t.priority}" onclick="openModal('${t.id}')">
      <div class="tc-top">
        <span class="tc-id">${t.id}</span>
        <span class="badge ${t.priority}">${t.priority === 'urgent' ? '🔴 Urgent' : '🟢 Regular'}</span>
        <span class="badge ${t.status}">${statusLabel(t.status)}</span>
      </div>
      <div class="tc-meta"><strong>${esc(t.workerName)}</strong> &nbsp;·&nbsp; ${esc(t.room)} &nbsp;·&nbsp; ${esc(t.category)}</div>
      <div class="tc-desc">${esc(t.description)}</div>
      <div class="tc-time">${timeAgo(t.createdAt)}</div>
    </div>
  `).join('');
}

function statusLabel(s) {
  return s === 'new' ? '🔵 New' : s === 'in-progress' ? '🟡 In Progress' : '✅ Resolved';
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setFilter(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  renderTickets();
}

// ── Modal ─────────────────────────────────────────────
function openModal(id) {
  currentTicketId = id;
  const t = allTickets.find(x => x.id === id);
  if (!t) return;

  document.getElementById('modalTitle').textContent = `Ticket ${t.id}`;

  let mediaHtml = '';
  if (t.mediaBase64) {
    if (t.mediaType && t.mediaType.startsWith('image/')) {
      mediaHtml = `
        <div class="section-label">Attachment</div>
        <div class="modal-media">
          <img src="${t.mediaBase64}" alt="attachment" onclick="window.open(this.src,'_blank')"/>
          <a href="${t.mediaBase64}" download="attachment">⬇ Download</a>
        </div>`;
    } else {
      mediaHtml = `
        <div class="section-label">Attachment</div>
        <div class="modal-media">
          <video src="${t.mediaBase64}" controls></video>
          <a href="${t.mediaBase64}" download="attachment">⬇ Download video</a>
        </div>`;
    }
  }

  document.getElementById('modalBody').innerHTML = `
    <div class="detail-row"><span class="lbl">Worker</span><span class="val">${esc(t.workerName)}</span></div>
    <div class="detail-row"><span class="lbl">Phone</span><span class="val"><a href="tel:${esc(t.workerPhone)}">${esc(t.workerPhone)||'—'}</a></span></div>
    <div class="detail-row"><span class="lbl">Room / Location</span><span class="val">${esc(t.room)}</span></div>
    <div class="detail-row"><span class="lbl">Category</span><span class="val">${esc(t.category)}</span></div>
    <div class="detail-row"><span class="lbl">Priority</span><span class="val">${t.priority === 'urgent' ? '🔴 Urgent' : '🟢 Regular'}</span></div>
    <div class="detail-row"><span class="lbl">Submitted</span><span class="val">${new Date(t.createdAt).toLocaleString()}</span></div>
    <div class="detail-row" style="flex-direction:column"><span class="lbl" style="margin-bottom:4px">Description</span><span class="val" style="white-space:pre-wrap">${esc(t.description)}</span></div>
    ${mediaHtml}
    <div class="section-label">Status</div>
    <div class="status-row">
      <button class="status-btn ${t.status==='new'?'active-new':''}" onclick="updateStatus('new')">🔵 New</button>
      <button class="status-btn ${t.status==='in-progress'?'active-inprog':''}" onclick="updateStatus('in-progress')">🟡 In Progress</button>
      <button class="status-btn ${t.status==='resolved'?'active-resolved':''}" onclick="updateStatus('resolved')">✅ Resolved</button>
    </div>
    <div class="section-label">Manager Notes</div>
    <textarea class="notes-area" id="notesArea" placeholder="Add notes here…">${esc(t.notes)}</textarea>
    <button id="saveNotes" onclick="saveNotes()">💾 Save Notes</button>
  `;

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  currentTicketId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

async function updateStatus(status) {
  if (!currentTicketId) return;
  await fetch(`/api/tickets/${currentTicketId}`, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ status })
  });
  await fetchTickets();
  openModal(currentTicketId);
  showToast('Status updated');
}

async function saveNotes() {
  if (!currentTicketId) return;
  const notes = document.getElementById('notesArea').value;
  await fetch(`/api/tickets/${currentTicketId}`, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ notes })
  });
  await fetchTickets();
  showToast('Notes saved');
}

// ── Polling ───────────────────────────────────────────
let pollInterval;
function startPolling() {
  fetchTickets();
  pollInterval = setInterval(fetchTickets, 5000);
}
</script>
</body>
</html>
